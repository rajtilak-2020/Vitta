<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 512px;
      height: 512px;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .logo-container {
      width: 512px;
      height: 512px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      padding: 120px; /* Generous padding to prevent zooming/clipping on Android */
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="nummo.svg" />
  </div>
</body>
</html>
